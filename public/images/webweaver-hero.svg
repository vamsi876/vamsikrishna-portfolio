  <line x1="520" y1="104" x2="560" y2="78" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="560" cy="78" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="710" y1="124" x2="740" y2="95" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="740" cy="95" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="710" y1="124" x2="680" y2="95" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="680" cy="95" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="500" y1="296" x2="460" y2="320" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="460" cy="320" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="500" y1="296" x2="470" y2="260" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="470" cy="260" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="720" y1="266" x2="750" y2="290" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="750" cy="290" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="550" y1="356" x2="520" y2="390" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="520" cy="390" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="550" y1="356" x2="580" y2="390" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="580" cy="390" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="680" y1="356" x2="650" y2="390" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="650" cy="390" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <line x1="680" y1="356" x2="710" y2="390" stroke="#1c1c1e" stroke-width="0.5"/>
  <circle cx="710" cy="390" r="8" fill="#22c55e" opacity="0.05" stroke="#27272a" stroke-width="0.5"/>

  <!-- Stats at bottom of right panel -->
  <rect x="450" y="420" width="300" height="36" rx="8" fill="#0a0a0a"/>
  <text x="470" y="442" font-family="monospace" font-size="10" fill="#52525b">Nodes:</text>
  <text x="520" y="442" font-family="monospace" font-size="10" fill="#22c55e">40,127</text>
  <text x="580" y="442" font-family="monospace" font-size="10" fill="#52525b">Depth:</text>
  <text x="624" y="442" font-family="monospace" font-size="10" fill="#22c55e">5</text>
