<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg3)"/>

  <!-- Left panel: Code/Terminal -->
  <rect x="30" y="30" width="380" height="440" rx="12" fill="#0a0a0a" stroke="#27272a" stroke-width="1"/>

  <!-- Terminal header -->
  <rect x="30" y="30" width="380" height="36" rx="12" fill="#1c1c1e"/>
  <rect x="30" y="54" width="380" height="12" fill="#1c1c1e"/>
  <circle cx="50" cy="48" r="5" fill="#ff5f57"/>
  <circle cx="68" cy="48" r="5" fill="#febc2e"/>
  <circle cx="86" cy="48" r="5" fill="#28c840"/>
  <text x="220" y="52" font-family="monospace" font-size="11" fill="#52525b" text-anchor="middle">webweaver — crawler.py</text>

  <!-- Python code -->
  <text x="50" y="90" font-family="monospace" font-size="11" fill="#c084fc">from</text>
  <text x="88" y="90" font-family="monospace" font-size="11" fill="#a1a1aa"> webweaver </text>
  <text x="180" y="90" font-family="monospace" font-size="11" fill="#c084fc">import</text>
  <text x="228" y="90" font-family="monospace" font-size="11" fill="#22c55e"> Crawler</text>

  <text x="50" y="116" font-family="monospace" font-size="11" fill="#52525b"># Configure crawl</text>

  <text x="50" y="140" font-family="monospace" font-size="11" fill="#a1a1aa">crawler = </text>
  <text x="128" y="140" font-family="monospace" font-size="11" fill="#22c55e">Crawler</text>
  <text x="176" y="140" font-family="monospace" font-size="11" fill="#a1a1aa">(</text>

  <text x="70" y="158" font-family="monospace" font-size="11" fill="#a1a1aa">base_url=</text>
  <text x="146" y="158" font-family="monospace" font-size="11" fill="#eab308">"https://isu.edu"</text>
  <text x="298" y="158" font-family="monospace" font-size="11" fill="#a1a1aa">,</text>

  <text x="70" y="176" font-family="monospace" font-size="11" fill="#a1a1aa">max_depth=</text>
  <text x="154" y="176" font-family="monospace" font-size="11" fill="#3b82f6">5</text>
  <text x="162" y="176" font-family="monospace" font-size="11" fill="#a1a1aa">,</text>

  <text x="70" y="194" font-family="monospace" font-size="11" fill="#a1a1aa">respect_robots=</text>
  <text x="186" y="194" font-family="monospace" font-size="11" fill="#22c55e">True</text>
  <text x="214" y="194" font-family="monospace" font-size="11" fill="#a1a1aa">,</text>

  <text x="70" y="212" font-family="monospace" font-size="11" fill="#a1a1aa">concurrency=</text>
  <text x="162" y="212" font-family="monospace" font-size="11" fill="#3b82f6">10</text>

  <text x="50" y="230" font-family="monospace" font-size="11" fill="#a1a1aa">)</text>

  <text x="50" y="258" font-family="monospace" font-size="11" fill="#52525b"># Start async crawl</text>

  <text x="50" y="282" font-family="monospace" font-size="11" fill="#c084fc">await</text>
  <text x="92" y="282" font-family="monospace" font-size="11" fill="#a1a1aa"> crawler.</text>
  <text x="160" y="282" font-family="monospace" font-size="11" fill="#22c55e">run</text>
  <text x="180" y="282" font-family="monospace" font-size="11" fill="#a1a1aa">()</text>

  <!-- Crawl output -->
  <rect x="40" y="300" width="360" height="4" rx="2" fill="#27272a"/>

  <text x="50" y="326" font-family="monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="66" y="326" font-family="monospace" font-size="10" fill="#a1a1aa">Crawled: 40,127 URLs</text>

  <text x="50" y="344" font-family="monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="66" y="344" font-family="monospace" font-size="10" fill="#a1a1aa">Deduplicated: 8,034 documents</text>

  <text x="50" y="362" font-family="monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="66" y="362" font-family="monospace" font-size="10" fill="#a1a1aa">Robots.txt: 142 paths excluded</text>

  <text x="50" y="380" font-family="monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="66" y="380" font-family="monospace" font-size="10" fill="#a1a1aa">Validation: all URLs clean</text>

  <!-- Progress bar -->
  <rect x="50" y="400" width="340" height="6" rx="3" fill="#27272a"/>
  <rect x="50" y="400" width="340" height="6" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="50" y="420" font-family="monospace" font-size="10" fill="#22c55e">100% complete</text>
  <text x="310" y="420" font-family="monospace" font-size="10" fill="#52525b">12m 34s</text>

  <!-- PyPI badge -->
  <rect x="50" y="440" width="80" height="20" rx="4" fill="#22c55e" opacity="0.1"/>
  <text x="66" y="454" font-family="monospace" font-size="10" fill="#22c55e">PyPI v2.0</text>

  <!-- Right panel: URL Graph visualization -->
  <rect x="430" y="30" width="340" height="440" rx="12" fill="#111113" stroke="#27272a" stroke-width="1"/>

  <text x="450" y="60" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">URL CRAWL GRAPH</text>

  <!-- Central node -->
  <circle cx="600" cy="200" r="24" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
