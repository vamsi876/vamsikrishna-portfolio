  <circle cx="720" cy="250" r="16" fill="#22c55e" opacity="0.08" stroke="#27272a" stroke-width="1"/>
  <text x="720" y="254" font-family="monospace" font-size="7" fill="#a1a1aa" text-anchor="middle">/library</text>

