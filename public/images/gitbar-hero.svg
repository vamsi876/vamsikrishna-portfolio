  <rect x="688" y="428" width="72" height="24" rx="6" fill="#2684ff" opacity="0.1"/>
  <text x="696" y="444" font-family="monospace" font-size="10" fill="#2684ff">Bitbucket</text>

  <!-- Left side: Terminal/code view -->
  <rect x="30" y="60" width="460" height="400" rx="12" fill="#0a0a0a" stroke="#27272a" stroke-width="1"/>

  <!-- Terminal header -->
  <rect x="30" y="60" width="460" height="36" rx="12" fill="#1c1c1e"/>
  <rect x="30" y="84" width="460" height="12" fill="#1c1c1e"/>
  <text x="200" y="82" font-family="monospace" font-size="11" fill="#52525b" text-anchor="middle">~/projects/gitbar</text>

  <!-- Terminal content -->
  <text x="50" y="120" font-family="monospace" font-size="12" fill="#52525b">$</text>
  <text x="66" y="120" font-family="monospace" font-size="12" fill="#22c55e">pip install gitbar</text>

  <text x="50" y="148" font-family="monospace" font-size="11" fill="#a1a1aa">Collecting gitbar</text>
  <text x="50" y="166" font-family="monospace" font-size="11" fill="#a1a1aa">  Downloading gitbar-1.2.0.tar.gz</text>
  <text x="50" y="184" font-family="monospace" font-size="11" fill="#22c55e">Successfully installed gitbar-1.2.0</text>

  <text x="50" y="216" font-family="monospace" font-size="12" fill="#52525b">$</text>
  <text x="66" y="216" font-family="monospace" font-size="12" fill="#22c55e">gitbar start</text>

  <text x="50" y="244" font-family="monospace" font-size="11" fill="#a1a1aa">🟢 GitBar running in menubar</text>
  <text x="50" y="262" font-family="monospace" font-size="11" fill="#a1a1aa">   Connected: GitHub (3 repos)</text>
  <text x="50" y="280" font-family="monospace" font-size="11" fill="#a1a1aa">   Connected: GitLab (1 repo)</text>
  <text x="50" y="298" font-family="monospace" font-size="11" fill="#52525b">   Polling interval: 60s</text>

  <!-- Git stats visualization -->
  <text x="50" y="340" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">CONTRIBUTION GRAPH</text>
