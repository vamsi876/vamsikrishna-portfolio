<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>

  <!-- macOS Menubar -->
  <rect x="0" y="0" width="800" height="32" rx="16" fill="#1c1c1e"/>
  <rect x="0" y="16" width="800" height="16" fill="#1c1c1e"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="5" fill="#febc2e"/>
  <circle cx="56" cy="16" r="5" fill="#28c840"/>

  <!-- GitBar icon in menubar -->
  <rect x="680" y="8" width="16" height="16" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="684" y="21" font-family="monospace" font-size="10" fill="#0a0a0a" font-weight="bold">G</text>

  <!-- Dropdown Panel -->
  <rect x="520" y="40" width="260" height="420" rx="12" fill="#111113" stroke="#27272a" stroke-width="1"/>

  <!-- Panel Header -->
  <text x="540" y="68" font-family="system-ui, sans-serif" font-size="14" fill="#fafafa" font-weight="600">GitBar Dashboard</text>
  <circle cx="756" cy="62" r="4" fill="#22c55e"/>

  <!-- PR Section -->
  <text x="540" y="100" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">PULL REQUESTS</text>
  <rect x="540" y="110" width="220" height="44" rx="8" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <circle cx="558" cy="132" r="8" fill="#22c55e" opacity="0.15"/>
  <text x="554" y="136" font-family="monospace" font-size="10" fill="#22c55e">✓</text>
  <text x="574" y="128" font-family="system-ui" font-size="11" fill="#a1a1aa">feat: add dark mode toggle</text>
  <text x="574" y="142" font-family="monospace" font-size="9" fill="#52525b">#142 · 2 hours ago</text>

  <rect x="540" y="160" width="220" height="44" rx="8" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <circle cx="558" cy="182" r="8" fill="#eab308" opacity="0.15"/>
  <text x="553" y="186" font-family="monospace" font-size="10" fill="#eab308">●</text>
  <text x="574" y="178" font-family="system-ui" font-size="11" fill="#a1a1aa">fix: resolve merge conflict</text>
  <text x="574" y="192" font-family="monospace" font-size="9" fill="#52525b">#139 · 5 hours ago</text>

  <!-- Issues Section -->
  <text x="540" y="228" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">ISSUES</text>
  <rect x="540" y="238" width="220" height="44" rx="8" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <circle cx="558" cy="260" r="8" fill="#3b82f6" opacity="0.15"/>
  <text x="553" y="264" font-family="monospace" font-size="10" fill="#3b82f6">◆</text>
  <text x="574" y="256" font-family="system-ui" font-size="11" fill="#a1a1aa">Add GitLab CI/CD support</text>
  <text x="574" y="270" font-family="monospace" font-size="9" fill="#52525b">#87 · enhancement</text>

  <!-- CI/CD Section -->
  <text x="540" y="306" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">CI/CD STATUS</text>
  <rect x="540" y="316" width="220" height="36" rx="8" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <circle cx="558" cy="334" r="5" fill="#22c55e"/>
  <text x="572" y="338" font-family="system-ui" font-size="11" fill="#a1a1aa">main</text>
  <text x="680" y="338" font-family="monospace" font-size="10" fill="#22c55e">passing</text>

  <rect x="540" y="358" width="220" height="36" rx="8" fill="#18181b" stroke="#27272a" stroke-width="0.5"/>
  <circle cx="558" cy="376" r="5" fill="#22c55e"/>
  <text x="572" y="380" font-family="system-ui" font-size="11" fill="#a1a1aa">develop</text>
  <text x="680" y="380" font-family="monospace" font-size="10" fill="#22c55e">passing</text>

  <!-- Repo Stats -->
  <text x="540" y="418" font-family="monospace" font-size="10" fill="#52525b" letter-spacing="1.5">REPOS</text>
  <rect x="540" y="428" width="68" height="24" rx="6" fill="#22c55e" opacity="0.1"/>
  <text x="554" y="444" font-family="monospace" font-size="10" fill="#22c55e">GitHub</text>
  <rect x="614" y="428" width="68" height="24" rx="6" fill="#e2622e" opacity="0.1"/>
